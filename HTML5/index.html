<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Alert Viewer</title>

    <!-- Tailwind (CDN for prototypes) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />

    <link rel="stylesheet" href="assets/css/styles.css" />
  </head>
  <body class="bg-gray-50 min-h-screen">
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
      <div class="container-fluid">
        <a class="navbar-brand" href="#"><i class="fa-solid fa-bell"></i> Sky Takeaway Test - Alert Viewer</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu" aria-controls="navMenu" aria-expanded="false" aria-label="Toggle navigation">
          <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navMenu">
          <ul class="navbar-nav me-auto mb-2 mb-lg-0"></ul>
          <form class="d-flex" role="search" onsubmit="return false;">
            <input id="searchInput" class="form-control me-2" type="search" placeholder="Search message, service, host..." aria-label="Search" />
            <select id="severityFilter" class="form-select me-2">
              <option value="all">All severities</option>
              <option value="critical">Critical</option>
              <option value="high">High</option>
              <option value="warning">Warning</option>
              <option value="info">Info</option>
              <option value="low">Low</option>
            </select>
            <button id="refreshBtn" class="btn btn-light" type="button">Refresh</button>
          </form>
        </div>
      </div>
    </nav>

    <main class="container py-6">
      <div class="row">
        <div class="col-12 mb-4">
          <div class="card shadow-sm">
            <div class="card-body d-flex justify-content-between align-items-center">
              <div>
                <h5 class="card-title mb-0">Alerts</h5>
                <small class="text-muted">Loaded from sample dataset</small>
              </div>
              <div class="text-end">
                <div id="summary" class="text-sm text-muted"></div>
              </div>
            </div>
          </div>
        </div>

        <div class="col-12" id="alertsContainer">
          <!-- Alerts will be injected here -->
        </div>
      </div>
    </main>

    <footer class="text-center py-4 text-muted">
      <small>Built with Tailwind, Bootstrap & Font Awesome — local static copy of sample alerts.</small>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/app.js"></script>
  </body>
</html>
